<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Sphere</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #080810;
  width:100vw; height:100vh;
  overflow:hidden;
  font-family: 'Space Mono', monospace;
}

#canvas-container { width:100%; height:100%; position:relative; }
canvas { display:block; }

/* Vignette overlay */
#vignette {
  position:absolute; inset:0;
  background: radial-gradient(ellipse at center,
    transparent 40%,
    rgba(0,0,0,0.55) 100%);
  pointer-events:none;
}

/* Scanline effect */
#scanlines {
  position:absolute; inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events:none;
  opacity:0.6;
}

#hud-top {
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 28px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

#title {
  color: rgba(255,255,255,0.18);
  font-size:9px;
  letter-spacing:5px;
  text-transform:uppercase;
}

#status {
  color: rgba(120,255,160,0.5);
  font-size:9px;
  letter-spacing:3px;
  display:flex; align-items:center; gap:8px;
}

.dot {
  width:5px; height:5px; border-radius:50%;
  background: rgba(120,255,160,0.8);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.3; transform:scale(0.7); }
}

/* Shape controls — pill group */
#shape-controls {
  position:absolute; bottom:34px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:0;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius:4px;
  overflow:hidden;
  backdrop-filter:blur(10px);
}

.shape-btn {
  background: rgba(255,255,255,0.04);
  border:none;
  border-right: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.35);
  padding:9px 18px;
  font-family:'Space Mono', monospace;
  font-size:9px;
  letter-spacing:2px;
  cursor:pointer;
  transition:all 0.18s;
  text-transform:uppercase;
}
.shape-btn:last-child { border-right:none; }
.shape-btn:hover { background:rgba(255,255,255,0.09); color:rgba(255,255,255,0.7); }
.shape-btn.active {
  background:rgba(255,255,255,0.13);
  color:rgba(255,255,255,0.95);
}

#hint {
  position:absolute; bottom:12px; left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.15);
  font-size:8px; letter-spacing:3px; text-transform:uppercase;
  white-space:nowrap;
  pointer-events:none;
}

/* Corner brackets */
.corner {
  position:absolute;
  width:18px; height:18px;
  border-color:rgba(255,255,255,0.12);
  border-style:solid;
  pointer-events:none;
}
.corner.tl { top:56px; left:16px; border-width:1px 0 0 1px; }
.corner.tr { top:56px; right:16px; border-width:1px 1px 0 0; }
.corner.bl { bottom:70px; left:16px; border-width:0 0 1px 1px; }
.corner.br { bottom:70px; right:16px; border-width:0 1px 1px 0; }

#loading {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:#080810;
  color:rgba(255,255,255,0.3);
  font-size:10px; letter-spacing:4px;
  text-transform:uppercase;
  transition:opacity 0.6s;
}
</style>
</head>
<body>
<div id="canvas-container">
  <div id="vignette"></div>
  <div id="scanlines"></div>

  <div id="hud-top">
    <div id="title">3D Texture Viewer</div>
    <div id="status"><div class="dot"></div>RENDER LIVE</div>
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="shape-controls">
    <button class="shape-btn active" id="btn-sphere"   onclick="setShape('sphere',this)">Sphere</button>
    <button class="shape-btn"        id="btn-torus"    onclick="setShape('torus',this)">Torus</button>
    <button class="shape-btn"        id="btn-box"      onclick="setShape('box',this)">Cube</button>
    <button class="shape-btn"        id="btn-torusknot"onclick="setShape('torusknot',this)">Knot</button>
  </div>

  <div id="hint">drag · scroll to zoom · right-drag to pan</div>
  <div id="loading">Loading texture…</div>
</div>

function loadTextureFromDataURL(dataURL, callback) {
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width  = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    callback(tex);
  };
  img.onerror = function(e) {
    console.error('Texture load error', e);
  };
  img.src = dataURL;
}

// ─── Scene ────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x080810);

// Subtle star field
(function() {
  const geo = new THREE.BufferGeometry();
  const pts = [];
  for (let i=0; i<1200; i++) {
    pts.push((Math.random()-0.5)*80, (Math.random()-0.5)*80, (Math.random()-0.5)*80);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
  const mat = new THREE.PointsMaterial({ color:0xffffff, size:0.04, transparent:true, opacity:0.5 });
  scene.add(new THREE.Points(geo, mat));
})();

const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0,0,3.5);

// ─── Lighting ─────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.45));

const key = new THREE.DirectionalLight(0xffeedd, 1.4);
key.position.set(4, 5, 6);
scene.add(key);

const fill = new THREE.DirectionalLight(0x8899ff, 0.35);
fill.position.set(-4, -2, -4);
scene.add(fill);

const rim = new THREE.PointLight(0x00ffaa, 0.6, 12);
rim.position.set(-2, 3, -3);
scene.add(rim);

// ─── Material (set after texture loads) ───────────────────────
const material = new THREE.MeshStandardMaterial({
  roughness: 0.55,
  metalness: 0.08,
  envMapIntensity: 0.5,
});

// ─── Geometries ───────────────────────────────────────────────
let currentMesh = null;
let targetRotY = 0, currentRotY = 0;
let targetRotX = 0, currentRotX = 0;
let autoRotate = true;

function createGeometry(type) {
  switch(type) {
    case 'sphere':    return new THREE.SphereGeometry(1.2, 96, 96);
    case 'torus':     return new THREE.TorusGeometry(0.85, 0.42, 48, 160);
    case 'box':       return new THREE.BoxGeometry(1.8,1.8,1.8,4,4,4);
    case 'torusknot': return new THREE.TorusKnotGeometry(0.68, 0.26, 256, 48);
  }
}

function setShape(type, btn) {
  document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(currentMesh) { scene.remove(currentMesh); currentMesh.geometry.dispose(); }
  currentMesh = new THREE.Mesh(createGeometry(type), material);
  scene.add(currentMesh);
}

// ─── Orbit controls (manual) ──────────────────────────────────
let isDragging=false, isRight=false, prevX=0, prevY=0;
let panX=0, panY=0, zoom=3.5;
const ZMIN=1.2, ZMAX=10;
let rotX=0.1, rotY=0;

const cvs = renderer.domElement;

cvs.addEventListener('mousedown', e=>{
  isDragging=true; isRight=(e.button===2);
  prevX=e.clientX; prevY=e.clientY; autoRotate=false;
});
cvs.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  const dx=e.clientX-prevX, dy=e.clientY-prevY;
  if(isRight){ panX+=dx*0.004; panY-=dy*0.004; }
  else { rotY+=dx*0.007; rotX+=dy*0.007; rotX=Math.max(-1.4,Math.min(1.4,rotX)); }
  prevX=e.clientX; prevY=e.clientY;
});
window.addEventListener('mouseup', ()=>isDragging=false);
cvs.addEventListener('wheel', e=>{
  zoom += e.deltaY*0.004;
  zoom = Math.max(ZMIN,Math.min(ZMAX,zoom));
});

// Touch
let lastDist=null;
cvs.addEventListener('touchstart', e=>{
  autoRotate=false;
  if(e.touches.length===1){
    isDragging=true; isRight=false;
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  } else if(e.touches.length===2){
    lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
});
cvs.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    const dx=e.touches[0].clientX-prevX, dy=e.touches[0].clientY-prevY;
    rotY+=dx*0.007; rotX+=dy*0.007; rotX=Math.max(-1.4,Math.min(1.4,rotX));
    prevX=e.touches[0].clientX; prevY=e.touches[0].clientY;
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if(lastDist){ zoom-=(d-lastDist)*0.01; zoom=Math.max(ZMIN,Math.min(ZMAX,zoom)); }
    lastDist=d;
  }
},{passive:false});
cvs.addEventListener('touchend',()=>{ isDragging=false; lastDist=null; });

// ─── Resize ───────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ─── Animate ──────────────────────────────────────────────────
let clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getDelta();
  if(autoRotate) rotY += 0.0035;

  camera.position.x = panX + zoom * Math.sin(rotY) * Math.cos(rotX);
  camera.position.y = panY + zoom * Math.sin(rotX);
  camera.position.z = zoom * Math.cos(rotY) * Math.cos(rotX);
  camera.lookAt(panX, panY, 0);

  // Subtle rim light orbit
  rim.position.x = Math.sin(Date.now()*0.0005)*3;
  rim.position.z = Math.cos(Date.now()*0.0005)*3;

  renderer.render(scene,camera);
}

// ─── Boot ─────────────────────────────────────────────────────
loadTextureFromDataURL(FACE_DATA, (tex) => {
  material.map = tex;
  material.needsUpdate = true;
  setShape('sphere', document.getElementById('btn-sphere'));
  const loading = document.getElementById('loading');
  loading.style.opacity = '0';
  setTimeout(()=>loading.style.display='none', 700);
  animate();
});
</script>
